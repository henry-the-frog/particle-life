<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Life — Henry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; font-family: system-ui, sans-serif; color: #aaa; }
  canvas { display: block; cursor: crosshair; }
  .controls { display: flex; gap: 0.5rem; padding: 0.5rem; flex-wrap: wrap; justify-content: center; }
  button { background: #222; color: #ccc; border: 1px solid #444; padding: 0.3rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  button:hover { border-color: #58a6ff; }
  .info { font-size: 0.7rem; color: #666; text-align: center; padding: 0.3rem; }
  .info a { color: #58a6ff; text-decoration: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <button onclick="randomize()">🎲 New Rules</button>
  <button onclick="init()">🔄 Reset</button>
  <button onclick="symmetrize()">🔄 Symmetrize</button>
  <button onclick="addParticles(50)">➕ More</button>
</div>
<p class="info">
  Particles attract/repel based on random rules. Each color is a species. Emergent life from simple physics.
  <br><a href="https://github.com/henry-the-frog" target="_blank">Henry</a> · 
  <a href="https://henry-the-frog.github.io" target="_blank">Blog</a>
</p>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 60;
}
resize();
window.addEventListener('resize', resize);

const SPECIES = 6;
const colors = ['#ff4444','#44ff44','#4488ff','#ffff44','#ff44ff','#44ffff'];
let particles = [];
let rules = []; // rules[i][j] = attraction of species i to species j
const RADIUS = 80;
const FRICTION = 0.5;
const DT = 0.02;
const FORCE_SCALE = 5;

function makeRules() {
  rules = [];
  for (let i = 0; i < SPECIES; i++) {
    rules[i] = [];
    for (let j = 0; j < SPECIES; j++) {
      rules[i][j] = Math.random() * 2 - 1; // -1 to 1
    }
  }
}

function symmetrize() {
  for (let i = 0; i < SPECIES; i++) {
    for (let j = i + 1; j < SPECIES; j++) {
      const avg = (rules[i][j] + rules[j][i]) / 2;
      rules[i][j] = avg;
      rules[j][i] = avg;
    }
  }
}

function addParticles(n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: 0, vy: 0,
      species: Math.floor(Math.random() * SPECIES)
    });
  }
}

function init() {
  particles = [];
  addParticles(300);
}

function randomize() {
  makeRules();
  init();
}

function step() {
  for (let i = 0; i < particles.length; i++) {
    let fx = 0, fy = 0;
    const p = particles[i];
    
    for (let j = 0; j < particles.length; j++) {
      if (i === j) continue;
      const q = particles[j];
      let dx = q.x - p.x;
      let dy = q.y - p.y;
      
      // Wrap around
      if (dx > canvas.width / 2) dx -= canvas.width;
      if (dx < -canvas.width / 2) dx += canvas.width;
      if (dy > canvas.height / 2) dy -= canvas.height;
      if (dy < -canvas.height / 2) dy += canvas.height;
      
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0 && dist < RADIUS) {
        const force = rules[p.species][q.species];
        // Force curve: repel if very close, attract/repel at medium range
        let f;
        const t = dist / RADIUS;
        if (t < 0.3) {
          // Universal repulsion at close range
          f = (t / 0.3 - 1) * 2;
        } else {
          // Species-specific interaction
          f = force * (1 - Math.abs(2 * t - 1.3) / 0.7);
        }
        f *= FORCE_SCALE / dist;
        fx += dx * f;
        fy += dy * f;
      }
    }
    
    p.vx = (p.vx + fx * DT) * (1 - FRICTION * DT);
    p.vy = (p.vy + fy * DT) * (1 - FRICTION * DT);
  }
  
  // Move and wrap
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x += canvas.width;
    if (p.x >= canvas.width) p.x -= canvas.width;
    if (p.y < 0) p.y += canvas.height;
    if (p.y >= canvas.height) p.y -= canvas.height;
  }
}

function render() {
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (const p of particles) {
    ctx.fillStyle = colors[p.species];
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function loop() {
  step();
  render();
  requestAnimationFrame(loop);
}

makeRules();
init();
loop();
</script>
</body>
</html>
